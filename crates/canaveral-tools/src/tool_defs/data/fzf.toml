id = "fzf"
name = "fzf"
binary = "fzf"
repo = "junegunn/fzf"
tag_prefix = "v"

# Asset: fzf-{version}-{os}_{arch}.tar.gz
# Archive contains: fzf (at root)
asset = "fzf-{version}-{os}_{arch}.tar.gz"
format = "tar.gz"

[version_detect]
args = ["--version"]
regex = '(\d+\.\d+\.\d+)'

[[files]]
name = "fzf"

[platforms.darwin-aarch64]
os = "darwin"
arch = "arm64"

[platforms.darwin-x86_64]
os = "darwin"
arch = "amd64"

[platforms.linux-x86_64]
os = "linux"
arch = "amd64"

[platforms.linux-aarch64]
os = "linux"
arch = "arm64"

[platform_overrides.windows-x86_64]
format = "zip"
asset = "fzf-{version}-{os}_{arch}.zip"

[platforms.windows-x86_64]
os = "windows"
arch = "amd64"
