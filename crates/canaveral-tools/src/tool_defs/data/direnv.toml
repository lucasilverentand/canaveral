id = "direnv"
name = "direnv"
binary = "direnv"
repo = "direnv/direnv"
tag_prefix = "v"

# Raw binary download — no archive
# Asset names: direnv.{os}-{arch}
url = "https://github.com/direnv/direnv/releases/download/v{version}/direnv.{os}-{arch}"
format = "raw"

[version_detect]
args = ["version"]

[platforms.darwin-aarch64]
os = "darwin"
arch = "arm64"

[platforms.darwin-x86_64]
os = "darwin"
arch = "amd64"

[platforms.linux-x86_64]
os = "linux"
arch = "amd64"

[platforms.linux-aarch64]
os = "linux"
arch = "arm64"

[platforms.windows-x86_64]
os = "windows"
arch = "amd64"
