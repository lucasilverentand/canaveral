id = "hyperfine"
name = "hyperfine"
binary = "hyperfine"
repo = "sharkdp/hyperfine"
tag_prefix = "v"

# Asset: hyperfine-v{version}-{target}.tar.gz
# Archive contains: hyperfine-v{version}-{target}/hyperfine
asset = "hyperfine-v{version}-{os}.tar.gz"
format = "tar.gz"

[version_detect]
args = ["--version"]

[[files]]
name = "hyperfine"
src = "hyperfine-v{version}-{os}/hyperfine"

[platforms.darwin-aarch64]
os = "aarch64-apple-darwin"
arch = "aarch64"

[platforms.darwin-x86_64]
os = "x86_64-apple-darwin"
arch = "x86_64"

[platforms.linux-x86_64]
os = "x86_64-unknown-linux-musl"
arch = "x86_64"

[platforms.linux-aarch64]
os = "aarch64-unknown-linux-gnu"
arch = "aarch64"

[platform_overrides.windows-x86_64]
format = "zip"
asset = "hyperfine-v{version}-{os}.zip"

[platforms.windows-x86_64]
os = "x86_64-pc-windows-msvc"
arch = "x86_64"
