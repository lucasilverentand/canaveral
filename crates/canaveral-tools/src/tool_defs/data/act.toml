id = "act"
name = "act"
binary = "act"
repo = "nektos/act"
tag_prefix = "v"

# Asset: act_{os}_{arch}.tar.gz
# Archive contains: act (at root)
asset = "act_{os}_{arch}.tar.gz"
format = "tar.gz"

[version_detect]
args = ["--version"]
regex = '(\d+\.\d+\.\d+)'

[[files]]
name = "act"

[platforms.darwin-aarch64]
os = "Darwin"
arch = "arm64"

[platforms.darwin-x86_64]
os = "Darwin"
arch = "x86_64"

[platforms.linux-x86_64]
os = "Linux"
arch = "x86_64"

[platforms.linux-aarch64]
os = "Linux"
arch = "arm64"

[platform_overrides.windows-x86_64]
format = "zip"
asset = "act_{os}_{arch}.zip"

[platforms.windows-x86_64]
os = "Windows"
arch = "x86_64"
