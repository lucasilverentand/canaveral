id = "xcodegen"
name = "XcodeGen"
binary = "xcodegen"
repo = "yonaskolb/XcodeGen"
tag_prefix = ""

# macOS-only: xcodegen.zip (no version/arch in filename)
asset = "xcodegen.zip"
format = "zip"

[version_detect]
args = ["--version"]

[[files]]
name = "xcodegen"

[platforms.darwin-aarch64]
os = "macos"
arch = "arm64"

[platforms.darwin-x86_64]
os = "macos"
arch = "amd64"
