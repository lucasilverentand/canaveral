id = "git-cliff"
name = "git-cliff"
binary = "git-cliff"
repo = "orhun/git-cliff"
tag_prefix = "v"

# Asset: git-cliff-{version}-{target}.tar.gz
# Archive contains: git-cliff-{version}/git-cliff
asset = "git-cliff-{version}-{os}.tar.gz"
format = "tar.gz"

[version_detect]
args = ["--version"]

[[files]]
name = "git-cliff"
src = "git-cliff-{version}/git-cliff"

[platforms.darwin-aarch64]
os = "aarch64-apple-darwin"
arch = "aarch64"

[platforms.darwin-x86_64]
os = "x86_64-apple-darwin"
arch = "x86_64"

[platforms.linux-x86_64]
os = "x86_64-unknown-linux-gnu"
arch = "x86_64"

[platforms.linux-aarch64]
os = "aarch64-unknown-linux-gnu"
arch = "aarch64"

[platform_overrides.windows-x86_64]
format = "zip"
asset = "git-cliff-{version}-{os}.zip"

[platforms.windows-x86_64]
os = "x86_64-pc-windows-msvc"
arch = "x86_64"
