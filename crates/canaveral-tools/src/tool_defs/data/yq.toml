id = "yq"
name = "yq"
binary = "yq"
repo = "mikefarah/yq"
tag_prefix = "v"

# Asset: yq_{os}_{arch}.tar.gz
# Archive contains: ./yq_{os}_{arch} (binary named with platform suffix)
# The binary inside the archive is named yq_{os}_{arch}, not just yq
asset = "yq_{os}_{arch}.tar.gz"
format = "tar.gz"

[version_detect]
args = ["--version"]
regex = '(\d+\.\d+\.\d+)'

[[files]]
name = "yq"
src = "./yq_{os}_{arch}"

[platforms.darwin-aarch64]
os = "darwin"
arch = "arm64"

[platforms.darwin-x86_64]
os = "darwin"
arch = "amd64"

[platforms.linux-x86_64]
os = "linux"
arch = "amd64"

[platforms.linux-aarch64]
os = "linux"
arch = "arm64"

[platform_overrides.windows-x86_64]
format = "zip"
asset = "yq_{os}_{arch}.zip"

[platforms.windows-x86_64]
os = "windows"
arch = "amd64"
