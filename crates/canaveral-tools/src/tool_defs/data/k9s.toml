id = "k9s"
name = "k9s"
binary = "k9s"
repo = "derailed/k9s"
tag_prefix = "v"

# Asset: k9s_{os}_{arch}.tar.gz
# Note: k9s uses title-case for Darwin/Linux but lowercase for arch
# Archive contains: k9s (at root)
asset = "k9s_{os}_{arch}.tar.gz"
format = "tar.gz"

[version_detect]
args = ["version", "--short"]
regex = '(\d+\.\d+\.\d+)'

[[files]]
name = "k9s"

[platforms.darwin-aarch64]
os = "Darwin"
arch = "arm64"

[platforms.darwin-x86_64]
os = "Darwin"
arch = "amd64"

[platforms.linux-x86_64]
os = "Linux"
arch = "amd64"

[platforms.linux-aarch64]
os = "Linux"
arch = "arm64"

[platform_overrides.windows-x86_64]
format = "zip"
asset = "k9s_{os}_{arch}.zip"

[platforms.windows-x86_64]
os = "Windows"
arch = "amd64"
