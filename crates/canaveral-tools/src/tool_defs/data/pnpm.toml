id = "pnpm"
name = "pnpm"
binary = "pnpm"
repo = "pnpm/pnpm"
tag_prefix = "v"
format = "raw"
url = "https://github.com/pnpm/pnpm/releases/download/v{version}/pnpm-{os}-{arch}"

[version_detect]
args = ["--version"]

[platforms.darwin-aarch64]
os = "macos"
arch = "arm64"

[platforms.darwin-x86_64]
os = "macos"
arch = "x64"

[platforms.linux-x86_64]
os = "linux"
arch = "x64"

[platforms.linux-aarch64]
os = "linux"
arch = "arm64"

[platforms.windows-x86_64]
os = "win"
arch = "x64"
